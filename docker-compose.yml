version: '3.9'

services:
  # Consul Service Discovery
  consul:
    image: hashicorp/consul:1.17
    container_name: ecommerce-consul
    restart: unless-stopped
    ports:
      - '8500:8500'
    command: agent -dev -client=0.0.0.0 -ui

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672' # AMQP port
      - '15672:15672' # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander - Redis GUI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ecommerce-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis

  # API Gateway Service
  api-gateway:
    image: ecommerce-backend:latest
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      JWT_ACCESS_SECRET: your-super-secret-jwt-access-key-min-32-chars
      JWT_REFRESH_SECRET: your-super-secret-jwt-refresh-key-min-32-chars
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_WINDOW_MS: 60000
    command: node dist/services/api-gateway/server.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

  # Product Catalog Service
  product-catalog:
    image: ecommerce-backend:latest
    container_name: ecommerce-product-catalog
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      LOG_LEVEL: info
    command: node dist/services/product-catalog/server.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

  # Order Service
  order:
    image: ecommerce-backend:latest
    container_name: ecommerce-order
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      LOG_LEVEL: info
    command: node dist/services/order/server.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

  # Inventory Service
  inventory:
    image: ecommerce-backend:latest
    container_name: ecommerce-inventory
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      LOG_LEVEL: info
    command: node dist/services/inventory/server.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

  # Notification Service
  notification:
    image: ecommerce-backend:latest
    container_name: ecommerce-notification
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      LOG_LEVEL: info
    command: node dist/services/notification/server.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  default:
    name: ecommerce-network
